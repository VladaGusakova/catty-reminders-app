name: CD Pipeline

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          username: pass1234
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3140
          script: |
            cd /home/pass1234/Desktop/DevOps/catty-reminders-app
            chmod +x deploy.sh
            ./deploy.sh lab2 ${{ github.sha }}
