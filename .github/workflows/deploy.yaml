name: CD Pipeline

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Convert repository name to lowercase
      id: prep
      run: echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          IMAGE_NAME="ghcr.io/${{ steps.prep.outputs.repo_lower }}:${{ github.sha }}"
          CONTAINER_NAME="catty-app-container"

          echo "Авторизация в GitHub Container Registry..."
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          echo "Скачиваем образ $IMAGE_NAME..."
          docker pull $IMAGE_NAME

          echo "Останавливаем старый контейнер..."
          docker stop $CONTAINER_NAME || true
          docker rm -f $CONTAINER_NAME || true

          echo "Запускаем новый контейнер..."
          docker run -d \
            --name $CONTAINER_NAME \
            -p 8181:8181 \
            --restart always \
            -e DEPLOY_REF=${{ github.sha }} \
            $IMAGE_NAME

          echo "Очищаем старые неиспользуемые образы Docker..."
          docker image prune -af || true
