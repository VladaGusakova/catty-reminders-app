name: CI Pipeline

on:
  push:
    branches:
      - lab3
      - lab3_autotests*
  pull_request:
    branches:
      - lab3
      - lab3_autotests*

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vladagusakova/catty-reminders-app:latest
            ghcr.io/vladagusakova/catty-reminders-app:${{ github.sha }}
