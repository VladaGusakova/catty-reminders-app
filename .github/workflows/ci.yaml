name: CI Pipeline

on:
  push:
    branches:
      - lab3
      - lab3_autotests*
  pull_request:
    branches:
      - lab3
      - lab3_autotests*
      
jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-playwright
          playwright install chromium --with-deps
          
      - name: Start application for tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          sleep 5
	
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ --junitxml=test_result.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

      - name: Convert repository name to lowercase
        id: prep
        run: echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.repo_lower }}:latest
            ghcr.io/${{ steps.prep.outputs.repo_lower }}:${{ github.sha }}
            build-args: |
            DEPLOY_REF=${{ github.sha }}
