services:
  backend:
    image: ghcr.io/vladagusakova/catty-reminders-app:${DEPLOY_REF:-latest}
    ports:
      - "8181:8181"
    restart: always
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mypass
      MYSQL_DATABASE: catty_reminders
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
